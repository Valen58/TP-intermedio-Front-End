<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
</head>
<body>
    <article>
        <header>
            <img src="./assets/images/logo_header.png" alt="company logo" id="company-logo">
            <h3>Character Counter</h3>
            <button id="config-button"><img src="./assets/images/logo_config_header.png" alt="config button"></button>
        </header>
    <h1>Analyze your text in real-time.</h1>

    <textarea name="" id="">Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>

    <div id="checkbox-area">
        <input type="checkbox" name="" class="checkbox">Exclude Spaces
        <input type="checkbox" name="" class="checkbox">Set Character Limit
        <p>Aprox. reading time: <1 minute</p>
    </div>

    <section id="cards-area">
        <div>
            <h2>278</h2>
            <p>Total Characters</p>
        </div>
        <div>
            <h2>39</h2>
            <p>Word Count</p>
        </div>
        <div>
            <h2>04</h2>
            <p>Sentence Count</p>
        </div>
    </section>
        
    <section id="letter-density-area">
    <h3>Letter Density</h3>
    
    <div class="letter-row">
        <span class="letter">E</span>
        <progress value="9" max="40"></progress>
        <span class="value">40 (16.06%)</span>
    </div>

    <div class="letter-row">
        <span class="letter">I</span>
        <progress value="6" max="40"></progress>
        <span class="value">29 (11.65%)</span>
    </div>

    <div class="letter-row">
        <span class="letter">T</span>
        <progress value="5.5" max="40"></progress>
        <span class="value">28 (11.24%)</span>
    </div>

    <div class="letter-row">
        <span class="letter">O</span>
        <progress value="4" max="40"></progress>
        <span class="value">22 (8.84%)</span>
    </div>

    <div class="letter-row">
        <span class="letter">N</span>
        <progress value="3.6" max="40"></progress>
        <span class="value">21 (8.43%)</span>
    </div>

    <button id="see-more-button">See more ˅</button>
    </section>

    

    </article>
</body>
</html>
